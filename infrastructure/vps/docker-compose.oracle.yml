version: '3.8'

services:
  # Main Application Services
  dashboard:
    build: 
      context: ../..
      dockerfile: infrastructure/Dockerfile.dashboard
    ports:
      - "8080:8080"
    environment:
      - SERVER_ENV=production
      - DB_TYPE=oracle
      - DB_HOST=oracle-db
      - DB_PORT=1521
      - DB_SERVICE=XEPDB1
      - REDIS_HOST=redis
      - OXYLABS_API_KEY=${OXYLABS_API_KEY}
    depends_on:
      - oracle-db
      - redis
    restart: unless-stopped
    networks:
      - atlantic-network

  auth-service:
    build:
      context: ../..
      dockerfile: infrastructure/vps/Dockerfile.auth
    ports:
      - "8081:8081"
    environment:
      - SERVER_ENV=production
      - DB_TYPE=oracle
      - DB_HOST=oracle-db
      - DB_PORT=1521
      - DB_SERVICE=XEPDB1
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - oracle-db
    restart: unless-stopped
    networks:
      - atlantic-network

  billing-service:
    build:
      context: ../..
      dockerfile: infrastructure/vps/Dockerfile.billing
    ports:
      - "8082:8082"
    environment:
      - SERVER_ENV=production
      - DB_TYPE=oracle
      - DB_HOST=oracle-db
      - DB_PORT=1521
      - DB_SERVICE=XEPDB1
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    depends_on:
      - oracle-db
    restart: unless-stopped
    networks:
      - atlantic-network

  support-service:
    build:
      context: ../..
      dockerfile: infrastructure/vps/Dockerfile.support
    ports:
      - "8083:8083"
    environment:
      - SERVER_ENV=production
      - DB_TYPE=oracle
      - DB_HOST=oracle-db
      - DB_PORT=1521
      - DB_SERVICE=XEPDB1
    depends_on:
      - oracle-db
    restart: unless-stopped
    networks:
      - atlantic-network

  analytics-service:
    build:
      context: ../..
      dockerfile: infrastructure/vps/Dockerfile.analytics
    ports:
      - "8085:8085"
    environment:
      - SERVER_ENV=production
      - DB_TYPE=oracle
      - DB_HOST=oracle-db
      - DB_PORT=1521
      - DB_SERVICE=XEPDB1
      - REDIS_HOST=redis
    depends_on:
      - oracle-db
      - redis
    restart: unless-stopped
    networks:
      - atlantic-network

  # Oracle Database
  oracle-db:
    image: container-registry.oracle.com/database/express:21.3.0-xe
    container_name: oracle-xe
    environment:
      - ORACLE_PWD=${ORACLE_PASSWORD}
      - ORACLE_CHARACTERSET=AL32UTF8
    ports:
      - "1521:1521"
      - "5500:5500"
    volumes:
      - oracle_data:/opt/oracle/oradata
      - ./oracle-init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    networks:
      - atlantic-network
    healthcheck:
      test: ["CMD", "sqlplus", "-L", "system/${ORACLE_PASSWORD}@//localhost:1521/XE", "@/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - atlantic-network

  # Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.vps.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot
    depends_on:
      - dashboard
      - auth-service
      - billing-service
      - support-service
      - analytics-service
    restart: unless-stopped
    networks:
      - atlantic-network

volumes:
  oracle_data:
  redis_data:

networks:
  atlantic-network:
    driver: bridge