services:
  - type: web
    name: atlantic-proxy-backend
    env: go
    buildCommand: go build -tags netgo -ldflags '-s -w' -o app ./cmd/server/main.go
    startCommand: ./app
    plan: free
    rootDir: backend
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: atlantic-proxy-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://atlantic-proxy-frontend.onrender.com
    
  - type: web
    name: atlantic-proxy-frontend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    plan: free
    rootDir: frontend
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://atlantic-proxy-backend.onrender.com

databases:
  - name: atlantic-proxy-db
    databaseName: atlantic_proxy
    user: postgres
    plan: free