version: '3.8'

services:
  # Main Application Services
  dashboard:
    build: 
      context: ../..
      dockerfile: infrastructure/Dockerfile.dashboard
    ports:
      - "8080:8080"
    environment:
      - SERVER_ENV=production
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - OXYLABS_API_KEY=${OXYLABS_API_KEY}
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - atlantic-network

  auth-service:
    build:
      context: ../..
      dockerfile: infrastructure/vps/Dockerfile.auth
    ports:
      - "8081:8081"
    environment:
      - SERVER_ENV=production
      - DB_HOST=postgres
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - atlantic-network

  billing-service:
    build:
      context: ../..
      dockerfile: infrastructure/vps/Dockerfile.billing
    ports:
      - "8082:8082"
    environment:
      - SERVER_ENV=production
      - DB_HOST=postgres
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - atlantic-network

  support-service:
    build:
      context: ../..
      dockerfile: infrastructure/vps/Dockerfile.support
    ports:
      - "8083:8083"
    environment:
      - SERVER_ENV=production
      - DB_HOST=postgres
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - atlantic-network

  analytics-service:
    build:
      context: ../..
      dockerfile: infrastructure/vps/Dockerfile.analytics
    ports:
      - "8085:8085"
    environment:
      - SERVER_ENV=production
      - DB_HOST=postgres
      - REDIS_HOST=redis
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - atlantic-network

  # Database Services
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: atlantic_proxy
      POSTGRES_USER: atlantic_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../../database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - atlantic-network

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - atlantic-network

  # Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.vps.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot
    depends_on:
      - dashboard
      - auth-service
      - billing-service
      - support-service
      - analytics-service
    restart: unless-stopped
    networks:
      - atlantic-network

  # SSL Certificate Management
  certbot:
    image: certbot/certbot
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    command: certonly --webroot --webroot-path=/var/www/certbot --email admin@atlanticproxy.com --agree-tos --no-eff-email -d atlanticproxy.com -d www.atlanticproxy.com

volumes:
  postgres_data:
  redis_data:

networks:
  atlantic-network:
    driver: bridge